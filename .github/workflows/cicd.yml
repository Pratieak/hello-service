name: CICD
on:
  workflow_dispatch:
jobs:
  clean_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew
      - name: Clean build
        run: ./gradlew clean build